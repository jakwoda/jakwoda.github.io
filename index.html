let gridHeight = 42;
let cellSize = 20;
let grid = [];
let myColors = ["#ff0000", "#f0f000", "#0000ff","#000000"];
let myLineTypes = [ "spline", "zigzag", "dashed"];
let walker;
let type;

function setup() {
  createCanvas(gridWidth * cellSize, gridHeight * cellSize);
  for (let i = 0; i < gridWidth; i++) {
    grid[i] = [];
    for (let j = 0; j < gridHeight; j++) {
      grid[i][j] = false;
    }
  }
}
class Walker {
  constructor(startCell) {
    this.path = [startCell]; // initialize path with the starting cell
    this.currentCell = startCell;
    this.directions = [
      {x: 1, y: 0}, // right
      {x: 0, y: 1}, // down
      {x: -1, y: 0}, // left
      {x: 0, y: -1} // up
    ];
  }

  getNext() {
    // get all unoccupied neighboring cells
    let unoccupiedNeighbors = [];
    for (let i = 0; i < this.directions.length; i++) {
      let nextX = this.currentCell.x + this.directions[i].x;
      let nextY = this.currentCell.y + this.directions[i].y;
      if (nextX >= 0 && nextX < gridWidth && nextY >= 0 && nextY < gridHeight && !grid[nextX][nextY]) {
        unoccupiedNeighbors.push({x: nextX, y: nextY});
      }
    }
    // if there are any unoccupied neighbors, return a random one
    if (unoccupiedNeighbors.length > 0) {
      let randomIndex = floor(random(unoccupiedNeighbors.length));
      return unoccupiedNeighbors[randomIndex];
     
    } else {
      // otherwise, return null to signal the path is complete
      return null;
    }
  }

  move(cell) {
    this.currentCell = cell;
    this.path.push(cell);
  }

  getPath() {
    return this.path;
  }
  reset(startCell) {
    this.path = [startCell];
    this.currentCell = startCell;}
}

function draw() {
  // background(220);
  // drawGrid();
  let i = floor(mouseX / cellSize);
  let j = floor(mouseY / cellSize);
  if (i >= 0 && i < gridWidth && j >= 0 && j < gridHeight) {
    if (!walker) {
      
      // walker = new Walker({x: i, y: j});
    } else {
      let nextCell = walker.getNext();
      // stroke(random(myColors));
      if (nextCell) {
        walker.move(nextCell);
        grid[nextCell.x][nextCell.y] = true;
        drawPath(walker.getPath());
      } else {
        walker = new Walker({x: i, y: j});
           stroke(random(myColors));
        type = random(myLineTypes)
        print(type);
      }
    }
  }
}
 
function drawGrid() {
  for (let i = 0; i < gridWidth; i++) {
    for (let j = 0; j < gridHeight; j++) {
      let x = i * cellSize;
      let y = j * cellSize;
      strokeWeight(1);
      stroke(0);
      noFill();
      rect(x, y, cellSize, cellSize);
    }
  }
}






function mouseClicked() {
  let i = floor(mouseX / cellSize);
  let j = floor(mouseY / cellSize);
  if (i >= 0 && i < gridWidth && j >= 0 && j < gridHeight) {
    if (!walker) {
      walker = new Walker({x: i, y: j});
    } else {
      let nextCell = walker.getNext();
      if (nextCell) {
        walker.move(nextCell);
        grid[nextCell.x][nextCell.y] = true;
        drawPath(walker.getPath());
      } else {
        // walker = new Walker({x: i, y: j});
      }
    }
  }
}

function drawPath(path) {
 if (type == 'dashed') {
   strokeWeight(20);
    
 }
 
  else if (type == 'zigzag') {
  strokeCap(SQUARE);
     beginShape();
    strokeWeight(10);
  for (let i = 0; i < path.length; i++) {
    let x = path[i].x * cellSize+ cellSize / 2;
    let y = path[i].y * cellSize + cellSize / 2;
    if(i % 2== 0){
      vertex(x-2, y+4);
    }
    else{
      vertex(x+2, y-4);
    }
    
  }
  // stroke(random(255),random(255),random(255));

  endShape();
  // stroke(random(myColors));
 }
  else {
    strokeWeight(10);
      strokeCap(ROUND);
     noFill();
  beginShape();
  for (let i = 0; i < path.length; i++) {
    let x = path[i].x * cellSize + cellSize / 2;
    let y = path[i].y * cellSize + cellSize / 2;
    vertex(x, y);
  }
  // stroke(random(255),random(255),random(255));

  endShape();
  // stroke(random(myColors));
   
  }

 
}


function doubleClicked(){
  background(255);
  unoccupiedNeighbors = [];
}</script></p><a href="mailto:matmieciek@gmail.com" class="btn hero__btn">✉️</a></div><div class="l-grid l-grid--3"></div></div></main><footer class="footer"><div class="footer__social"><a href="https://www.facebook.com/fopajakwoda/" aria-label="Facebook" class="facebook"><svg><use xlink:href="https://jakwoda.github.io/assets/svg/svg-map.svg#facebook"/></svg> </a><a href="instagram.com/quasiaqua" aria-label="Instagram" class="instagram"><svg><use xlink:href="https://jakwoda.github.io/assets/svg/svg-map.svg#instagram"/></svg> </a><a href="https://www.linkedin.com/in/mateusz-mieciek-723527b6/" aria-label="LinkedIn" class="linkedin"><svg><use xlink:href="https://jakwoda.github.io/assets/svg/svg-map.svg#linkedin"/></svg> </a><a href="https://www.youtube.com/@jakwoda" aria-label="Youtube" class="youtube"><svg><use xlink:href="https://jakwoda.github.io/assets/svg/svg-map.svg#youtube"/></svg></a></div><div class="footer__copyright">Jak Woda 2026</div></footer><script>window.publiiThemeMenuConfig = {
